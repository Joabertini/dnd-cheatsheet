// ─── Parsear hoja de personaje ───
function parseCharacterSheet(json) {
  // Foundry VTT actor JSON
  if (json.items && Array.isArray(json.items)) {
    const classItem = json.items.find(i => i.type === 'class');
    const subclassItem = json.items.find(i => i.type === 'subclass');
    const name = json.name || null;
    const level = classItem?.system?.levels || classItem?.system?.level || null;
    const rawClass = (classItem?.name || json.system?.details?.originalClass || '').toLowerCase().trim();
    const rawSubclass = subclassItem?.name || '';
    return { name, level, rawClass, rawSubclass, source: 'Foundry VTT' };
  }
  // Genérico
  const rawClass = (json.class || json.className || json.classes?.[0]?.name || '').toLowerCase().trim();
  if (rawClass) {
    return {
      name: json.name || json.charName || null,
      level: json.level || json.charLevel || json.classes?.[0]?.level || null,
      rawClass,
      rawSubclass: json.subclass || json.subclassName || '',
      source: 'JSON genérico'
    };
  }
  return null;
}

        React.createElement('div', { style: { display: 'grid', gap: 8 } },

      activeTab === 'universal' && React.createElement('div', null,
        UNIVERSAL_RULES.map((section, si) =>
          React.createElement('div', { key: si, style: { marginBottom: 18 } },
            React.createElement('div', { style: { fontSize: 11, fontWeight: 'bold', color: cls.accent, letterSpacing: '0.1em', marginBottom: 7, borderBottom: `1px solid ${cls.color}40`, paddingBottom: 4 } }, section.title.toUpperCase()),
            React.createElement('div', { style: { display: 'grid', gap: 5 } },

                  React.createElement('div', { style: { fontSize: 12, color: '#ccc', lineHeight: 1.4 } }, item.desc)
                )
              )
            )
          )
        ),
        React.createElement('div', { style: { marginTop: 6 } },
          React.createElement('div', { style: { fontSize: 11, fontWeight: 'bold', color: cls.accent, letterSpacing: '0.1em', marginBottom: 7, borderBottom: `1px solid ${cls.color}40`, paddingBottom: 4 } }, 'CONDICIONES PRINCIPALES'),
          React.createElement('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 } },
            [
              { name: 'Prono', effect: 'Desventaja en ataques · Melee vs vos con ventaja · Mitad del mov para pararse' },
              { name: 'Inconsciente', effect: 'Tiradas de muerte · Ataques con ventaja · Crítico automático a 5ft' },
              { name: 'Atrapado', effect: 'Sin movimiento · Desventaja en ataques · Ventaja para atacantes' },
              { name: 'Asustado', effect: 'No puede acercarse a la fuente · Desventaja en checks/ataques mientras la ve' },
              { name: 'Paralizado', effect: 'Indefenso · Crítico automático a 5ft · Falla STR y DEX saves' },
              { name: 'Concentración', effect: '1 hechizo a la vez · Daño: CON save DC10 o mitad del daño (el mayor)' },
            ].map((c, i) =>
              React.createElement('div', { key: i, style: { padding: '6px 10px', background: '#ffffff05', borderRadius: 4, border: '1px solid #ffffff10' } },
                React.createElement('div', { style: { fontSize: 11, fontWeight: 'bold', color: '#e8c070', marginBottom: 2 } }, c.name),
                React.createElement('div', { style: { fontSize: 10, color: '#888', lineHeight: 1.4 } }, c.effect)
              )
            )
          )
        )
      )
    ),

    // FOOTER
    React.createElement('div', { style: { position: 'relative', zIndex: 1, textAlign: 'center', padding: '10px', borderTop: '1px solid #222', fontSize: 10, color: '#444', marginTop: 8 } },
      `Bertini's · Cheat Sheet de ${charName} · ${cls.icon} Nivel ${charLevel} ${selectedClass.charAt(0).toUpperCase() + selectedClass.slice(1)}`
    )
  );
}
