// ─── HELPERS ─────────────────────────────────────────────────────────────────
function parseCharacterSheet(json) {
  if (json.items && Array.isArray(json.items)) {
    const classItems = json.items.filter(i => i.type === 'class');
    const subclassItems = json.items.filter(i => i.type === 'subclass');
    const featItems = json.items.filter(i => i.type === 'feat');

    const primary = classItems[0];
    const allClasses = classItems.map(i => (i.name || '').toLowerCase().trim());
    const allSubclasses = subclassItems.map(i => i.name || '');

    // Detectar feats por nombre exacto (case-insensitive)
    const featKeys = Object.keys(FEATS_DATA).map(k => k.toLowerCase());
    const detectedFeats = featItems
      .map(i => i.name || '')
      .filter(n => featKeys.includes(n.toLowerCase()))
      .map(n => Object.keys(FEATS_DATA).find(k => k.toLowerCase() === n.toLowerCase()))
      .filter(Boolean);

    return {
      name: json.name || null,
      level: primary?.system?.levels || primary?.system?.level || null,
      rawClass: (primary?.name || '').toLowerCase().trim(),
      rawSubclass: allSubclasses[0] || '',
      allClasses,
      allSubclasses,
      detectedFeats,
      source: 'Foundry VTT'
    };
  }
  const rawClass = (json.class || json.className || '').toLowerCase().trim();
  if (rawClass) {
    return {
      name: json.name || json.charName || null,
      level: json.level || json.charLevel || null,
      rawClass,
      rawSubclass: json.subclass || '',
      allClasses: [rawClass],
      allSubclasses: json.subclass ? [json.subclass] : [],
      detectedFeats: [],
      source: 'JSON genérico'
    };
  }
  return null;
}

function detectCombos(allClasses, allSubclasses, detectedFeats) {
  const cls = allClasses.map(c => c.toLowerCase());
  const sub = allSubclasses.map(s => s.toLowerCase());
  return COMBOS_DATA.filter(combo => {
    try { return combo.check(cls, sub, detectedFeats); } catch { return false; }
  });
}

async function trackUsage(parsed, fileName) {
  if (!DISCORD_WEBHOOK) return;
  try {
    const geo = await fetch('https://ipapi.co/json/').then(r => r.json()).catch(() => ({}));
    const flag = geo.country_code
      ? String.fromCodePoint(...[...geo.country_code].map(c => c.charCodeAt(0) + 127397))
      : '';
    const charInfo = parsed
      ? `**${parsed.name || 'Sin nombre'}** — ${parsed.rawClass || '?'} nv ${parsed.level || '?'}${parsed.rawSubclass ? ` (${parsed.rawSubclass})` : ''}`
      : 'No se pudo parsear';
    const featInfo = parsed?.detectedFeats?.length
      ? parsed.detectedFeats.join(', ')
      : 'ninguna detectada';

    await fetch(DISCORD_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        embeds: [{
          title: '📄 Nueva hoja arrastrada',
          color: 5763719,
          fields: [
            { name: 'Personaje', value: charInfo, inline: false },
            { name: 'Feats detectadas', value: featInfo, inline: false },
            { name: 'Archivo', value: fileName || 'desconocido', inline: true },
            { name: 'Ubicación', value: [flag, geo.city, geo.region, geo.country_name].filter(Boolean).join(', ') || 'desconocida', inline: true },
            { name: 'IP', value: geo.ip || 'desconocida', inline: true },
            { name: 'Hora', value: new Date().toUTCString(), inline: false }
          ]
        }]
      })
    });
  } catch { /* silencioso */ }
}

// ─── MAIN COMPONENT ───────────────────────────────────────────────────────────
function CheatSheet() {
  const [selectedClass, setSelectedClass] = useState('fighter');
  const [selectedSubclass, setSelectedSubclass] = useState(null);
  const [charName, setCharName] = useState('Tu Personaje');
  const [charLevel, setCharLevel] = useState(1);
  const [editingName, setEditingName] = useState(false);
  const [activeTab, setActiveTab] = useState('combat');
  const [animKey, setAnimKey] = useState(0);
  const [dragOver, setDragOver] = useState(false);
  const [importMsg, setImportMsg] = useState(null);
  const [detectedFeats, setDetectedFeats] = useState([]);
  const [detectedCombos, setDetectedCombos] = useState([]);
  const [hasImport, setHasImport] = useState(false);

  const cls = CLASS_DATA[selectedClass];
  const subclasses = Object.keys(cls.subclasses);
  const subData = selectedSubclass ? cls.subclasses[selectedSubclass] : null;

  useEffect(() => { setSelectedSubclass(null); setAnimKey(k => k + 1); }, [selectedClass]);

  const handleDragOver = useCallback(e => { e.preventDefault(); setDragOver(true); }, []);
  const handleDragLeave = useCallback(e => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOver(false); }, []);

  const handleDrop = useCallback(e => {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer.files[0];
    if (!file) return;
    if (!file.name.endsWith('.json')) {
      setImportMsg({ text: '❌ Solo se aceptan archivos .json', ok: false });
      setTimeout(() => setImportMsg(null), 3000);
      return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        const parsed = parseCharacterSheet(data);

        // Tracking (silencioso)
        trackUsage(parsed, file.name);

        if (!parsed || !parsed.rawClass) {
          setImportMsg({ text: '❌ No se encontró información de clase', ok: false });
          setTimeout(() => setImportMsg(null), 3500);
          return;
        }
        const classKey = Object.keys(CLASS_DATA).find(k =>
          k === parsed.rawClass || parsed.rawClass.includes(k) || k.includes(parsed.rawClass)
        );
        if (!classKey) {
          setImportMsg({ text: `❌ Clase "${parsed.rawClass}" no reconocida`, ok: false });
          setTimeout(() => setImportMsg(null), 3500);
          return;
        }
        setSelectedClass(classKey);
        if (parsed.name) setCharName(parsed.name);
        if (parsed.level) setCharLevel(Number(parsed.level));

        if (parsed.rawSubclass) {
          const subKeys = Object.keys(CLASS_DATA[classKey].subclasses);
          const subKey = subKeys.find(s =>
            s.toLowerCase() === parsed.rawSubclass.toLowerCase() ||
            parsed.rawSubclass.toLowerCase().includes(s.toLowerCase()) ||
            s.toLowerCase().includes(parsed.rawSubclass.toLowerCase())
          );
          if (subKey) setSelectedSubclass(subKey);
        }

        const feats = parsed.detectedFeats || [];
        const combos = detectCombos(parsed.allClasses, parsed.allSubclasses, feats);
        setDetectedFeats(feats);
        setDetectedCombos(combos);
        setHasImport(true);

        const displayName = parsed.name || 'Personaje';
        const featStr = feats.length ? ` · ${feats.length} feat${feats.length > 1 ? 's' : ''}` : '';
        const comboStr = combos.length ? ` · ${combos.length} combo${combos.length > 1 ? 's' : ''}` : '';
        setImportMsg({ text: `✓ ${displayName} — ${classKey} nv ${parsed.level || '?'} cargado${featStr}${comboStr}`, ok: true });
        setTimeout(() => setImportMsg(null), 5000);

        // Auto-switch a combat tab para ver los resultados
        setActiveTab('combat');
      } catch {
        setImportMsg({ text: '❌ Error al leer el archivo JSON', ok: false });
        setTimeout(() => setImportMsg(null), 3000);
      }
    };
    reader.readAsText(file);
  }, []);

  const allBonusActions = [
    ...cls.bonusActions,
    ...(subData?.extra?.filter(e => {
      const n = e.name.toLowerCase();
      return n.includes('adicional') || n.includes('bonus') || n.includes(' ba');
    }) || [])
  ];
  const allReactions = [...cls.reactions];
  const allFeatures = [...cls.classFeatures, ...(subData?.extra || [])];
  const forgottenTip = subData?.forgottenTip || cls.forgottenTip;

  return React.createElement('div', {
    onDragOver: handleDragOver,
    onDragLeave: handleDragLeave,
    onDrop: handleDrop,
    style: { minHeight: '100vh', background: cls.bg, fontFamily: "'Georgia', serif", color: '#e8e0d0', position: 'relative', overflow: 'hidden' }
  },
    // BG
    React.createElement('div', { style: { position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 0, background: `radial-gradient(ellipse at 20% 50%, ${cls.color}18 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, ${cls.accent}10 0%, transparent 50%)` } }),
